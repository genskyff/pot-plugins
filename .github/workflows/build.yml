name: Build

on:
  push:
    branches: ["main"]
    tags: ["*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set plugin info
        run: |
          echo "NAME=$(jq -r '.id' info.json)" >> "$GITHUB_ENV"
          echo "ICON=$(jq -r '.icon' info.json)" >> "$GITHUB_ENV"

      - name: Package plugin
        uses: vimtor/action-zip@v1
        with:
          files: info.json main.js ${{ env.ICON }}
          dest: ${{ env.NAME }}.potext

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.NAME }}.potext
          path: "*.potext"
          if-no-files-found: error

      - name: Release
        if: startsWith(github.ref, 'refs/tags')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.potext"
